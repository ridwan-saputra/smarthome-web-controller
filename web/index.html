<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsio</title>
    <link rel="stylesheet" href="syles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h2>Ridwanio</h2>
        <div class="settings">
          <a href="#"><i class="fa-solid fa-gear"></i></a>
        </div>
      </header>
      <section class="items">
        <div class="item">
          <img src="./assets/light-bulb.png" alt="" class="item-image" />
          <button class="item-submit" onclick="location.href = 'lamp.html'">
            Lamp Control
          </button>
        </div>
        <div class="item">
          <img src="./assets/fan-on.png" alt="" class="item-image" />
          <button class="item-submit" onclick="location.href = 'fan.html'">
            Fan Control
          </button>
        </div>
        <div class="item">
          <img src="./assets/dashboard.png" alt="" class="item-image" />
          <button class="item-submit" onclick="alert('On Going')">
            Dasboard
          </button>
        </div>
      </section>
      <section class="bottom-bar">
        <ul>
          <li>
            <a href="#"><i class="fa-solid fa-home"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-lightbulb"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-fan"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-dashboard"></i></a>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
