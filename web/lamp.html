<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsio</title>
    <link rel="stylesheet" href="syles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h2>Ridwanio</h2>
        <div class="settings">
          <a href="#"><i class="fa-solid fa-gear"></i></a>
        </div>
      </header>
      <section class="page-title">
        <h3>Lamp Control</h3>
      </section>
      <section class="lamps">
        <div class="lamp">
          <img
            src="./assets/light-bulb-off.png"
            alt=""
            class="lamp-image"
            id="img-lamp-ruang1"
          />
          <p class="lamp-location-text">Ruang 1</p>
          <button
            class="btn-lamp-submit"
            id="btn-lamp-ruang1"
            onclick="alert('On Going')"
          >
            TURN ON
          </button>
        </div>
        <div class="lamp">
          <img
            src="./assets/light-bulb-off.png"
            alt=""
            class="lamp-image"
            id="img-lamp-ruang2"
          />
          <p class="lamp-location-text">Ruang 2</p>
          <button
            class="btn-lamp-submit"
            id="btn-lamp-ruang2"
            onclick="alert('On Going')"
          >
            TURN ON
          </button>
        </div>
        <div class="lamp">
          <img
            src="./assets/light-bulb-off.png"
            alt=""
            class="lamp-image"
            id="img-lamp-ruang3"
          />
          <p class="lamp-location-text">Ruang 3</p>
          <button
            class="btn-lamp-submit"
            id="btn-lamp-ruang3"
            onclick="alert('On Going')"
          >
            TURN ON
          </button>
        </div>

        <div class="lamp">
          <img
            src="./assets/light-bulb-off.png"
            alt=""
            class="lamp-image"
            id="img-lamp-ruang4"
          />
          <p class="lamp-location-text">Ruang 4</p>
          <button
            class="btn-lamp-submit"
            id="btn-lamp-ruang4"
            onclick="alert('On Going')"
          >
            TURN ON
          </button>
        </div>
      </section>
      <section class="bottom-bar">
        <ul>
          <li>
            <a href="#"><i class="fa-solid fa-home"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-lightbulb"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-fan"></i></a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-dashboard"></i></a>
          </li>
        </ul>
      </section>
    </div>
    <script src="main.js"></script>
  </body>
</html>
